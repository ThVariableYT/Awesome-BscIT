<html>
    <body>
        <script>
            let boolVal = true;
            alert(boolVal.toString());     // "true"
            alert(boolVal.valueOf());      // true
            alert(!boolVal);    // false (negation)
            alert(!!boolVal);  // true (double negation, returns actual boolean)
            alert(typeof boolVal); // "boolean"
        </script>
    </body>
</html>
