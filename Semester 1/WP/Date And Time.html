<html>
    <body>
        <script>
            let today = new Date();
            alert(today.toString());                // Full date-time string
            alert(today.getFullYear());             // Year
            alert(today.getMonth());                // Month (0-11)
            alert(today.getDate());                 // Day of the month
            alert(today.getDay());                  // Day of the week (0-6)
        </script>
    </body>
</html>
