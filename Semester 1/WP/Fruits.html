<html>
    <body>
        <script>
            let fruits = ["apple", "banana", "cherry"];
            alert(fruits.length);           //3
            alert(fruits.push("mango"));    // Add element 
            alert(fruits.pop());            // Remove last element
            alert(fruits.indexOf("apple")); // 0
            alert(fruits.join("**"));       // "apple**banana**cherry"
        </script>
    </body>
</html>
