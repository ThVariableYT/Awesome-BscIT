<html>
    <body>
        <script>
            function add(a, b) 
{ 
    return a + b; 
}
function greet(name) 
{ 
    return "Hello " + name; 
    
}

alert(add(2, 3));   // 5
alert(greet("Jash"));  // "Hello Jash"
alert(add.length);  // 2 (number of parameters expected)
alert(add.toString()); // Function definition as string
alert(typeof add);  // "function"
        </script>
    </body>
</html>
