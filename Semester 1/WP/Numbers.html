<html>
    <body>
        <script>
            let num1 = 123.456;
            alert(num1.toFixed(2));                 // "123.46"
            alert(Number.isInteger (num1));         // false
            alert(Number.isNaN("abc"));             // false
            alert(Number.parseInt("10"));           // 10
            alert(Number.MAX_VALUE);                // Max numeric value in JS
        </script>
    </body>
</html>
