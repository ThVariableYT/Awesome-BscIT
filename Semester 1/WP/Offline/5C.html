<html>
    <body>
        <script>
            let start = 1;
            let end = 50;
            for (let i = start; i <= end; i++) {
                if (i < 2) continue;
                let isPrime = true;
                for (let j = 2; j <=Math.sqrt(i); j++) {
                    if (i % j === 0) {
                    isPrime = false;
                    break;
                }
            }
            if (isPrime)
            document.write(" " +i);
        }
        </script>
    </body>
</html>
