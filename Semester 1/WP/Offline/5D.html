<html>
    <body>
        <script>
            let n = parseInt(prompt("Enter number:"))
                let isPrime = true;
                for (let j = 2; j <=Math.sqrt(n); j++) {
                    if (n % j === 0) {
                    isPrime = false;
                    break;
                }
            }
            if (isPrime)
            document.write("Prime Number");
        else
            document.write("Not a prime number");
        </script>
    </body>
</html>
