<!Doctype HTML>
<html>
<head>
	<style>
		/* a. Change the background of the page */
		body {
			background-color: yellow
				}
		/* b. Change the font and the text styles */
		h1 {
			color: blue;
			font-size: 50px;
			text-align: center;
			text-decoration: underline;
		}

		/* c. Positioning an element */
		.box {
			width: 200px;
			height: 100px;
			background-color: pink;
			position: absolute;
			top: 250px;
			left: 250px;
			padding: 250px;
			border: 2px solid #000;
		}
	</style>
</head>

<body>
	<h1> CSS Styling Example </h1>
	<p class="box">
	I am a positioned box.
	</p>
			<p style="color:red"> Para 2 </p>
</body>
</html>
