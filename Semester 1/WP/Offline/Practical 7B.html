<html>
    <body>
        <script>
            let person = { name: "John", age: 30 } + "<br>";
            document.write(Object.keys(person) + "<br>");
            document.write(Object.values(person) + "<br>");
            document.write(person.toString() + "<br>");

            //number
            let num = 123.456;
            document.write(num.toFixed(2) + "<br>");
            document.write(Number.isInteger(num) + "<br>");
            document.write(Number.isNaN("abc") + "<br>");
            document.write(Number.parseInt("10.123") + "<br>");
            document.write(Number.MAX_VALUE + "<br>");
        </script>
    </body>
</html>
