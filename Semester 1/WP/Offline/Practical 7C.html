<html>
    <body>
        <script>
            //number
            let num = 123.456;
            document.write(num.toFixed(2) + "<br>");
            document.write(Number.isInteger(num) + "<br>");
            document.write(Number.isNaN("abc") + "<br>");
            document.write(Number.parseInt("10.123") + "<br>");
            document.write(Number.MAX_VALUE + "<br>");

            //Math
            document.write(Math.round(4.6) + "<br>");
            document.write(Math.floor(4.9) + "<br>");
            document.write(Math.ceil(4.1) + "<br>");
            document.write(Math.sqrt(16) + "<br>");
            document.write(Math.random() + "<br>");
        </script>
    </body>
</html>
