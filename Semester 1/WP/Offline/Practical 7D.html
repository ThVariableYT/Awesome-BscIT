<html>
    <body>
        <script>
            // String
            let msg = "JavaScript";
            document.write(msg.length + "<br>");
            document.write(msg.toUpperCase() + "<br>");
            document.write(msg.toLowerCase() + "<br>");
            document.write(msg.indexOf("S") + "<br>");
            document.write(msg.slice(0, 4) + "<br>");
        </script>
    </body>
</html>
