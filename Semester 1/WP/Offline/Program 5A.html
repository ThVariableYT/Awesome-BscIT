<html>
    <body>
        <script>
            // Prompt user and parse input in one line
            let number = parseInt(prompt("Enter a number to calculate its factorial:"));
            let fact= 1;
            for (let i = 1; i <=number; i++)
        {
            fact*= i;
        }
        // Display the result
        document.write(fact);
        </script>
    </body>
</html>
