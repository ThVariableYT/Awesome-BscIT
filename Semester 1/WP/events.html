<html>
    <body>
        <h2>Keyboard Events</h2>
        <input placeholder="Key Down" onkeydown="alert('Key Down')"><br><br>
        <input placeholder="Key Up" onkeyup="alert('Key Up')"><br><br>
        <input placeholder="Key Press" onkeypress="alert('Key Press')"><br><br>
        <input placeholder="Focus" onfocus="alert('Focus')"><br><br>
        <input placeholder="Blur" onblur="alert('Blur')"><br><br>
        <h2>Mouse Events</h2>
        <button onclick="alert('Click')">Click</button>
        <button ondblclick="alert('Double Click')">Double Click</button>
        <button onmouseover="alert('Mouse Over')">Mouse Over</button>
        <button onmouseout="alert('Mouse Out')">Mouse Out</button>
        <button onmousedown="alert('Mouse Down')">Mouse Down</button>
    </body>
</html>
