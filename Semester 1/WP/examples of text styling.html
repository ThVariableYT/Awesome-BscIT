<!DOCTYPE html>
<head>
  <title> Examples of Text Styling </title>
<body>

  <p><b>Bold</b></p>
  <p><strong>Strong</strong> (same as bold)</p>
  <p><i>Italic</i></p>
  <p><em>Emphasized</em> (same as italic)</p>
  <p><u>Underlined</u></p>
  <p><mark>Highlight (mark)</mark></p>
  <p><small>small</small></p>
  <p>H<sub>2</sub>O</p>
  <p>2<sup>nd</sup></p>
  <p><del>Delete</del></p>
  <p><ins>Insert</ins></p>
  <p>Line one <br> Line two</p>
  <hr>
  <p>This is after horizontal rule</p>

</body>
</html>
