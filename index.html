<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Visualizer</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #020617; /* Very dark slate base */
            color: #f8fafc; 
            overflow: hidden;
        }
        code, pre { font-family: 'Fira Code', monospace; }
        
        /* Smooth Liquid Glass Effects */
        .glass-panel {
            background: rgba(15, 23, 42, 0.45);
            backdrop-filter: blur(24px) saturate(180%);
            -webkit-backdrop-filter: blur(24px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-header {
            background: rgba(2, 6, 23, 0.55);
            backdrop-filter: blur(30px) saturate(200%);
            -webkit-backdrop-filter: blur(30px) saturate(200%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
        }

        .glass-button {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        
        .glass-button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }

        .glass-button:active {
            transform: scale(0.95);
        }

        /* Animated Ambient Background Blobs */
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1); }
            33% { transform: translate(40px, -60px) scale(1.1); }
            66% { transform: translate(-30px, 30px) scale(0.9); }
            100% { transform: translate(0px, 0px) scale(1); }
        }
        .animate-blob { animation: blob 12s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }

        /* Custom Soft Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.15); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.3); }

        /* Tree Styles with Smooth Animations */
        .tree-item { 
            cursor: pointer; 
            user-select: none; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            border: 1px solid transparent; 
        }
        .tree-item:hover { 
            background-color: rgba(255, 255, 255, 0.06); 
            border-color: rgba(255, 255, 255, 0.05); 
            transform: translateX(4px); 
        }
        .tree-item.active { 
            background: rgba(59, 130, 246, 0.2); 
            border-color: rgba(59, 130, 246, 0.3); 
            color: #fff; 
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.2), inset 0 0 10px rgba(59, 130, 246, 0.1); 
        }
        
        .folder-content { 
            overflow: hidden; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); 
            opacity: 1; 
            transform-origin: top; 
            max-height: 2000px;
        }
        .folder-content.collapsed { 
            max-height: 0; 
            opacity: 0; 
            transform: scaleY(0.95); 
        }
        
        /* Smooth Desktop Sidebar Toggle */
        #sidebar {
            transition: margin-left 0.5s cubic-bezier(0.16, 1, 0.3, 1), transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.4s ease;
        }
        @media (min-width: 768px) {
            .desktop-collapsed {
                margin-left: -18rem; /* Pulls exactly w-72 out of view while shifting main layout */
                opacity: 0;
                pointer-events: none;
            }
        }

        /* Loading Spinner */
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Code Container Override */
        .hljs { background: transparent !important; padding: 0 !important; }
        #code-display { tab-size: 4; transition: font-size 0.2s ease-out; }

        /* Fullscreen overrides */
        #viewer-section:fullscreen {
            background-color: #020617; /* Solid background when native fullscreen hides the animated blobs */
        }

        /* Markdown Body Styling */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #f8fafc; font-weight: 600; margin-top: 1.5em; margin-bottom: 0.5em; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.25em; }
        .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1em; padding-left: 1.5em; }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body code { font-family: 'Fira Code', monospace; background-color: rgba(255,255,255,0.1); padding: 0.2em 0.4em; border-radius: 6px; font-size: 0.9em; backdrop-filter: blur(4px); border: 1px solid rgba(255,255,255,0.05); }
        .markdown-body pre { background: rgba(0, 0, 0, 0.3); padding: 1em; border-radius: 12px; overflow-x: auto; margin-bottom: 1em; border: 1px solid rgba(255,255,255,0.05); box-shadow: inset 0 2px 10px rgba(0,0,0,0.2); }
        .markdown-body pre code { background-color: transparent; padding: 0; border: none; backdrop-filter: none; }
        .markdown-body a { color: #60a5fa; text-decoration: none; transition: color 0.2s; }
        .markdown-body a:hover { color: #93c5fd; text-decoration: underline; }
        .markdown-body strong { font-weight: 600; color: #f8fafc; }
        .markdown-body img { max-width: 100%; border-radius: 8px; margin: 1em 0; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="h-screen flex flex-col relative text-slate-200">

    <!-- Glowing Ambient Orbs for Liquid Background -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none z-[-1]">
        <div class="absolute top-[-15%] left-[-10%] w-[50%] h-[50%] rounded-full bg-indigo-600/20 blur-[120px] mix-blend-screen animate-blob"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[45%] h-[45%] rounded-full bg-blue-600/20 blur-[120px] mix-blend-screen animate-blob animation-delay-2000"></div>
        <div class="absolute top-[30%] left-[60%] w-[35%] h-[35%] rounded-full bg-purple-600/15 blur-[100px] mix-blend-screen animate-blob animation-delay-4000"></div>
    </div>

    <!-- Liquid Glass Navbar -->
    <header class="glass-header flex flex-col md:flex-row items-center justify-between px-4 sm:px-6 py-3 sm:py-4 shrink-0 z-30 gap-3 md:gap-0 transition-all duration-500">
        <div class="flex items-center w-full md:w-auto gap-3">
            <button id="menu-btn" class="p-2 -ml-2 glass-button rounded-xl text-slate-300" title="Toggle Explorer">
                <i data-lucide="menu" class="w-5 h-5"></i>
            </button>
            <div class="p-2 rounded-xl bg-blue-500/20 border border-blue-400/30 shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                <i data-lucide="book-open" class="text-blue-400 w-5 h-5 sm:w-6 sm:h-6 shrink-0"></i>
            </div>
            <h1 class="font-bold text-lg sm:text-xl tracking-tight text-white drop-shadow-md truncate">
                Code <span class="text-blue-400 hidden sm:inline font-semibold">Visualizer</span><span class="text-blue-400 sm:hidden font-semibold">Viewer</span>
            </h1>
        </div>
        
        <div class="flex items-center gap-2 w-full md:flex-1 max-w-xl md:ml-8">
            <div class="relative w-full group flex items-center gap-2">
                <div class="relative w-full">
                    <i data-lucide="github" class="absolute left-3.5 top-1/2 transform -translate-y-1/2 w-4 h-4 sm:w-5 sm:h-5 text-slate-400 group-focus-within:text-blue-400 transition-colors duration-300 z-10"></i>
                    <input type="text" id="repo-input" list="recent-repos" value="ThVariableYT/Awesome-BscIT" 
                        class="w-full bg-black/20 backdrop-blur-md border border-white/10 text-white text-xs sm:text-sm rounded-2xl focus:ring-2 focus:ring-blue-500/50 focus:border-blue-500/50 block pl-10 sm:pl-11 p-2 sm:p-3 transition-all duration-300 shadow-inner placeholder-slate-500 outline-none" 
                        placeholder="owner/repository">
                    <datalist id="recent-repos"></datalist>
                </div>
                
                <!-- Branch Switcher -->
                <select id="branch-select" class="glass-button bg-slate-900/60 text-white text-xs sm:text-sm rounded-2xl px-2 py-2 sm:py-3 outline-none hidden cursor-pointer border border-white/10 shadow-inner max-w-[120px] shrink-0" title="Select Branch">
                </select>
            </div>
            
            <button id="load-btn" class="glass-button bg-blue-600/40 hover:bg-blue-500/60 text-white font-medium rounded-2xl text-xs sm:text-sm px-4 sm:px-6 py-2 sm:py-3 border border-blue-400/40 shadow-[0_4px_20px_rgba(59,130,246,0.4)] flex items-center gap-1 sm:gap-2 shrink-0 group">
                <i data-lucide="search" class="w-4 h-4 group-hover:rotate-12 transition-transform duration-300"></i> <span class="hidden sm:inline drop-shadow-sm">Load</span>
            </button>
        </div>
        
        <div class="hidden lg:flex items-center gap-4 text-sm text-slate-300 font-medium shrink-0 px-4 py-2 rounded-2xl bg-white/5 border border-white/10 backdrop-blur-md">
            <span id="repo-stats" class="flex items-center gap-3">
                <span class="flex items-center gap-1"><i data-lucide="activity" class="w-4 h-4 text-slate-400"></i> Ready</span>
            </span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden relative z-10">
        
        <!-- Mobile Sidebar Overlay (Glassy) -->
        <div id="sidebar-overlay" class="absolute inset-0 bg-slate-950/60 backdrop-blur-sm z-10 hidden transition-all duration-500"></div>

        <!-- Sidebar (File Tree) -->
        <aside id="sidebar" class="absolute md:relative z-20 w-72 h-full glass-panel border-r border-white/10 flex flex-col overflow-hidden shrink-0 transform -translate-x-full md:translate-x-0 shadow-[10px_0_30px_rgba(0,0,0,0.3)] md:shadow-none">
            <div class="p-4 border-b border-white/10 flex justify-between items-center bg-white/5 backdrop-blur-md shrink-0">
                <h2 class="font-semibold text-slate-200 flex items-center gap-2 drop-shadow-sm">
                    <i data-lucide="folder-tree" class="w-4 h-4 text-blue-400"></i> Explorer
                </h2>
                <button id="close-sidebar-btn" class="md:hidden p-1.5 glass-button rounded-lg text-slate-300">
                    <i data-lucide="x" class="w-4 h-4"></i>
                </button>
            </div>
            
            <!-- Filter Search Bar -->
            <div class="px-3 py-3 border-b border-white/5 bg-white/5 shrink-0">
                <div class="relative group">
                    <i data-lucide="filter" class="absolute left-2.5 top-1/2 transform -translate-y-1/2 w-3.5 h-3.5 text-slate-400 group-focus-within:text-blue-400 transition-colors"></i>
                    <input type="text" id="file-search" placeholder="Filter files..." class="w-full bg-black/20 border border-white/10 text-slate-200 text-xs rounded-lg pl-8 p-1.5 focus:ring-1 focus:ring-blue-500/50 outline-none transition-all placeholder-slate-500 shadow-inner">
                </div>
            </div>

            <!-- Student Bookmarks Section -->
            <div class="px-3 py-2 border-b border-white/5 bg-white/[0.02] shrink-0">
                <h3 class="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-wider flex items-center gap-1.5 drop-shadow-sm">
                    <i data-lucide="star" class="w-3.5 h-3.5 text-yellow-500/70"></i> Study Bookmarks
                </h3>
                <div id="bookmarks-list" class="flex flex-col gap-1 max-h-32 overflow-y-auto hide-scrollbar text-xs">
                    <p class="text-slate-500 italic px-2 py-1">No bookmarks in this repo.</p>
                </div>
            </div>

            <!-- Main File Tree -->
            <div id="tree-container" class="flex-1 overflow-y-auto p-3 text-sm">
                <div class="flex flex-col items-center justify-center h-full text-slate-400 gap-4">
                    <div class="p-4 rounded-full bg-white/5 border border-white/10">
                        <i data-lucide="arrow-up" class="w-6 h-6 animate-bounce text-blue-400"></i>
                    </div>
                    <p class="text-center text-xs sm:text-sm px-4 font-medium">Enter a repository and click Load</p>
                </div>
            </div>
        </aside>

        <!-- Viewer Section -->
        <section id="viewer-section" class="flex-1 relative flex flex-col min-w-0 bg-black/10 backdrop-blur-3xl">
            
            <!-- File Header -->
            <div id="file-header" class="h-14 border-b border-white/10 flex items-center px-4 sm:px-6 bg-slate-900/40 backdrop-blur-xl shrink-0 hidden z-10 shadow-sm transition-all duration-300 overflow-x-auto hide-scrollbar">
                <div class="flex items-center gap-3 text-slate-200 text-xs sm:text-sm font-medium shrink-0">
                    <div class="p-1.5 rounded-lg bg-white/10 border border-white/10 shrink-0">
                        <i id="file-header-icon" data-lucide="file" class="w-4 h-4 text-blue-300"></i>
                    </div>
                    <div id="file-header-name" class="flex flex-wrap items-center truncate max-w-[200px] sm:max-w-md drop-shadow-sm whitespace-nowrap">
                        <!-- Breadcrumbs injected here -->
                    </div>
                </div>
                
                <div class="ml-auto flex items-center gap-1.5 sm:gap-2.5 pl-4 shrink-0">
                    <span id="file-size" class="text-[10px] sm:text-xs font-medium px-2 py-1 rounded-md bg-black/30 border border-white/5 text-slate-400 hidden sm:inline"></span>
                    
                    <!-- Liquid Gemini Actions -->
                    <button id="explain-btn" class="hidden items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-purple-200 bg-purple-500/20 hover:bg-purple-500/30 rounded-xl border border-purple-400/30 shadow-[0_0_15px_rgba(168,85,247,0.15)] hover:shadow-[0_0_20px_rgba(168,85,247,0.3)] transition-all duration-300 hover:scale-105 active:scale-95 shrink-0" title="Explain Code">
                        <i data-lucide="sparkles" class="w-3.5 h-3.5 text-purple-300"></i><span class="hidden lg:inline drop-shadow-sm">Explain</span>
                    </button>
                    <button id="improve-btn" class="hidden items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-emerald-200 bg-emerald-500/20 hover:bg-emerald-500/30 rounded-xl border border-emerald-400/30 shadow-[0_0_15px_rgba(16,185,129,0.15)] hover:shadow-[0_0_20px_rgba(16,185,129,0.3)] transition-all duration-300 hover:scale-105 active:scale-95 shrink-0" title="Suggest Improvements">
                        <i data-lucide="wand-2" class="w-3.5 h-3.5 text-emerald-300"></i><span class="hidden lg:inline drop-shadow-sm">Improve</span>
                    </button>

                    <div class="w-px h-6 bg-white/10 mx-1 hidden sm:block"></div>

                    <!-- Readability & Presentation Controls -->
                    <button id="font-decrease-btn" class="p-2 glass-button rounded-xl text-slate-300 hidden sm:flex items-center justify-center w-8 h-8" title="Decrease Font Size">
                        <span class="font-bold text-xs">A-</span>
                    </button>
                    <button id="font-increase-btn" class="p-2 glass-button rounded-xl text-slate-300 hidden sm:flex items-center justify-center w-8 h-8" title="Increase Font Size">
                        <span class="font-bold text-sm">A+</span>
                    </button>
                    
                    <button id="wrap-btn" class="p-2 glass-button rounded-xl text-slate-300" title="Toggle Word Wrap">
                        <i data-lucide="align-left" class="w-4 h-4"></i>
                    </button>
                    
                    <div class="w-px h-6 bg-white/10 mx-1 hidden sm:block"></div>

                    <!-- Action Buttons -->
                    <button id="bookmark-btn" class="p-2 glass-button rounded-xl text-slate-300" title="Bookmark File">
                        <i data-lucide="star" class="w-4 h-4"></i>
                    </button>
                    <button id="download-btn" class="p-2 glass-button rounded-xl text-slate-300" title="Download File">
                        <i data-lucide="download" class="w-4 h-4"></i>
                    </button>
                    <button id="fullscreen-btn" class="p-2 glass-button rounded-xl text-slate-300 hidden sm:flex" title="Toggle Fullscreen">
                        <i data-lucide="maximize" class="w-4 h-4"></i>
                    </button>
                    <button id="copy-btn" class="p-2 glass-button rounded-xl text-slate-300" title="Copy Content">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                    <a id="raw-link" href="#" target="_blank" class="p-2 glass-button rounded-xl text-slate-300" title="View Raw">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                    </a>
                </div>
            </div>

            <!-- Content Area Wrapper for Split View -->
            <div class="flex-1 flex overflow-hidden relative">
                
                <div id="content-container" class="flex-1 overflow-auto relative min-w-0">
                    
                    <!-- Initial State -->
                    <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 p-6 text-center">
                        <div class="p-6 rounded-3xl bg-white/5 border border-white/10 shadow-2xl backdrop-blur-xl mb-6">
                            <i data-lucide="layers" class="w-12 h-12 sm:w-16 sm:h-16 text-blue-400/80"></i>
                        </div>
                        <p class="text-lg sm:text-xl font-semibold text-white drop-shadow-md">No file selected</p>
                        <p class="text-sm sm:text-base mt-2 font-medium opacity-70">Select a file from the explorer to view its contents</p>
                    </div>

                    <!-- Loading State -->
                    <div id="loading-state" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/60 backdrop-blur-2xl z-10 hidden transition-all duration-300">
                        <div class="p-4 rounded-2xl bg-white/10 border border-white/20 shadow-2xl mb-4">
                            <i data-lucide="loader-2" class="w-8 h-8 text-blue-400 spinner"></i>
                        </div>
                        <p class="text-sm sm:text-base font-medium text-slate-200 drop-shadow-md" id="loading-text">Fetching file data...</p>
                    </div>

                    <!-- Code Block (with Line Numbers Wrapper) -->
                    <div id="code-container" class="hidden flex relative min-h-full w-full font-mono">
                        <div id="line-numbers" class="shrink-0 text-right px-4 sm:px-5 py-4 sm:py-6 text-slate-500/70 border-r border-white/5 select-none bg-white/[0.02] text-[13px] leading-relaxed transition-all duration-200"></div>
                        <pre id="code-wrapper" class="m-0 p-4 sm:p-6 flex-1 overflow-x-auto"><code id="code-display" class="text-[13px] leading-relaxed tracking-wide block"></code></pre>
                    </div>
                    
                    <!-- Markdown Previewer -->
                    <div id="markdown-wrapper" class="hidden markdown-body p-6 sm:p-10 min-h-full w-full max-w-5xl mx-auto"></div>

                    <!-- Image Viewer -->
                    <div id="image-wrapper" class="hidden h-full flex items-center justify-center p-6 sm:p-10">
                        <img id="image-display" src="" alt="File preview" class="max-w-full max-h-full rounded-2xl shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/10 object-contain bg-black/20 backdrop-blur-md">
                    </div>

                    <!-- Document Viewer -->
                    <div id="doc-wrapper" class="hidden h-full w-full bg-slate-900/80">
                        <iframe id="doc-display" src="" class="w-full h-full border-0 rounded-tl-2xl"></iframe>
                    </div>

                </div> <!-- End content-container -->

                <!-- AI Panel (Glassy) -->
                <div id="ai-panel" class="hidden flex-col w-full md:w-1/3 min-w-[320px] max-w-md border-t md:border-t-0 md:border-l border-white/10 glass-panel z-20 shrink-0 absolute right-0 inset-y-0 md:relative md:inset-auto transition-transform duration-500 ease-out shadow-[-10px_0_30px_rgba(0,0,0,0.3)] md:shadow-none">
                    <div class="h-14 border-b border-white/10 flex items-center justify-between px-5 shrink-0 bg-white/5 backdrop-blur-xl">
                        <span class="text-sm font-bold text-white flex items-center gap-2 drop-shadow-md">
                            <span class="p-1 rounded bg-gradient-to-tr from-purple-500 to-blue-500 shadow-sm"><i data-lucide="bot" class="w-4 h-4 text-white"></i></span> 
                            AI Assistant
                        </span>
                        <button id="close-ai-btn" class="glass-button p-1.5 rounded-lg text-slate-300">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                    
                    <!-- AI Response Area -->
                    <div class="flex-1 overflow-y-auto p-5 relative bg-transparent scroll-smooth flex flex-col">
                        <div id="ai-loading" class="hidden flex-col items-center justify-center h-full gap-4">
                            <div class="p-4 rounded-full bg-purple-500/20 border border-purple-500/30 shadow-[0_0_20px_rgba(168,85,247,0.3)]">
                                <i data-lucide="sparkles" class="w-8 h-8 text-purple-400 animate-pulse"></i>
                            </div>
                            <p class="text-sm text-slate-200 font-medium drop-shadow-md">Gemini is analyzing...</p>
                        </div>
                        <div id="ai-content" class="markdown-body flex-1">
                            <!-- AI response injected here -->
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- Liquid Error Toast -->
    <div id="error-toast" class="fixed bottom-8 right-4 sm:right-8 bg-red-950/80 backdrop-blur-2xl border border-red-500/30 text-white px-5 sm:px-6 py-4 rounded-2xl shadow-[0_10px_40px_rgba(239,68,68,0.3)] transform transition-all duration-500 cubic-bezier(0.175, 0.885, 0.32, 1.275) translate-y-40 opacity-0 flex items-center gap-3 z-50">
        <div class="p-1.5 rounded-full bg-red-500/20">
            <i data-lucide="alert-circle" class="w-5 h-5 text-red-400 shrink-0"></i>
        </div>
        <span id="error-message" class="text-xs sm:text-sm font-semibold tracking-wide"></span>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // DOM Elements
        const repoInput = document.getElementById('repo-input');
        const loadBtn = document.getElementById('load-btn');
        const treeContainer = document.getElementById('tree-container');
        const fileSearchInput = document.getElementById('file-search');
        const emptyState = document.getElementById('empty-state');
        const loadingState = document.getElementById('loading-state');
        const loadingText = document.getElementById('loading-text');
        const branchSelect = document.getElementById('branch-select');
        const recentReposList = document.getElementById('recent-repos');
        
        // Viewer Elements
        const viewerSection = document.getElementById('viewer-section');
        const codeContainer = document.getElementById('code-container');
        const lineNumbers = document.getElementById('line-numbers');
        const codeDisplay = document.getElementById('code-display');
        const markdownWrapper = document.getElementById('markdown-wrapper');
        const imageWrapper = document.getElementById('image-wrapper');
        const imageDisplay = document.getElementById('image-display');
        const docWrapper = document.getElementById('doc-wrapper');
        const docDisplay = document.getElementById('doc-display');
        
        // Header Controls
        const fileHeader = document.getElementById('file-header');
        const fileHeaderName = document.getElementById('file-header-name');
        const fileSize = document.getElementById('file-size');
        const downloadBtn = document.getElementById('download-btn');
        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const copyBtn = document.getElementById('copy-btn');
        const wrapBtn = document.getElementById('wrap-btn');
        const bookmarkBtn = document.getElementById('bookmark-btn');
        const fontIncreaseBtn = document.getElementById('font-increase-btn');
        const fontDecreaseBtn = document.getElementById('font-decrease-btn');
        const rawLink = document.getElementById('raw-link');
        const repoStats = document.getElementById('repo-stats');
        
        // AI DOM Elements
        const explainBtn = document.getElementById('explain-btn');
        const improveBtn = document.getElementById('improve-btn');
        const aiPanel = document.getElementById('ai-panel');
        const closeAiBtn = document.getElementById('close-ai-btn');
        const aiContent = document.getElementById('ai-content');
        const aiLoading = document.getElementById('ai-loading');

        // Mobile DOM Elements
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const menuBtn = document.getElementById('menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');

        // State
        let currentRepo = '';
        let defaultBranch = 'main';
        let activeFileElement = null;
        let currentFileUrl = '';
        let currentFileName = '';
        let currentFilePath = '';
        let currentFlatTree = [];
        let currentFontSize = 13;

        // File Icons Mapping
        const iconMap = {
            'html': 'file-code-2', 'js': 'file-json', 'jsx': 'file-json-2', 'ts': 'file-type-2', 'tsx': 'file-type-2',
            'css': 'file-code', 'json': 'file-json', 'md': 'file-text', 'py': 'file-code-2', 'java': 'file-code-2',
            'png': 'image', 'jpg': 'image', 'jpeg': 'image', 'gif': 'image', 'svg': 'image', 'ico': 'image',
            'pdf': 'file-text', 'doc': 'file-text', 'docx': 'file-text', 'zip': 'file-archive', 'gitignore': 'file-cog'
        };
        const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'svg', 'ico', 'webp'];
        const docExts = ['pdf', 'doc', 'docx'];
        const unsupportedExts = [
            'zip', 'tar', 'gz', 'rar', '7z', 'exe', 'dll', 'so', 'dylib', 
            'mp3', 'mp4', 'avi', 'mkv', 'webm', 'mov', 'ttf', 'otf', 'woff', 'woff2', 
            'eot', 'db', 'sqlite', 'sqlite3', 'bin', 'iso', 'dmg', 'class', 'jar', 'pyc'
        ];

        // Init Recent Repos & Bookmarks
        function updateRecentRepos(repo) {
            let repos = JSON.parse(localStorage.getItem('recent_repos') || '[]');
            if (!repos.includes(repo)) {
                repos.unshift(repo);
                if (repos.length > 8) repos.pop();
                localStorage.setItem('recent_repos', JSON.stringify(repos));
                renderRecentRepos();
            }
        }
        
        function renderRecentRepos() {
            let repos = JSON.parse(localStorage.getItem('recent_repos') || '[]');
            recentReposList.innerHTML = repos.map(r => `<option value="${r}">`).join('');
        }
        renderRecentRepos();

        // Bookmark System
        let bookmarksMap = JSON.parse(localStorage.getItem('study_bookmarks') || '{}');
        
        function renderBookmarks() {
            const list = document.getElementById('bookmarks-list');
            const repoBookmarks = bookmarksMap[currentRepo] || [];
            
            if (repoBookmarks.length === 0) {
                list.innerHTML = '<p class="text-slate-500 italic px-2 py-1">No bookmarks in this repo.</p>';
                return;
            }
            
            list.innerHTML = repoBookmarks.map(b => `
                <div class="flex items-center gap-2 py-1.5 px-2 rounded-lg hover:bg-white/10 cursor-pointer text-slate-300 hover:text-white transition-colors border border-transparent hover:border-white/5" onclick="loadBookmark('${b.path}')">
                    <i data-lucide="bookmark" class="w-3 h-3 text-blue-400 shrink-0"></i>
                    <span class="truncate tracking-wide">${b.name}</span>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function updateBookmarkUI() {
            if(!currentRepo || !currentFilePath) return;
            const repoBookmarks = bookmarksMap[currentRepo] || [];
            const isBookmarked = repoBookmarks.some(b => b.path === currentFilePath);
            const icon = bookmarkBtn.querySelector('svg, i');
            
            if (icon) {
                if (isBookmarked) {
                    icon.setAttribute('fill', 'currentColor');
                    icon.classList.add('text-yellow-400');
                } else {
                    icon.setAttribute('fill', 'none');
                    icon.classList.remove('text-yellow-400');
                }
            }
            
            renderBookmarks();
        }

        bookmarkBtn.addEventListener('click', () => {
            if (!currentFilePath) return;
            if (!bookmarksMap[currentRepo]) bookmarksMap[currentRepo] = [];
            
            const repoBookmarks = bookmarksMap[currentRepo];
            const index = repoBookmarks.findIndex(b => b.path === currentFilePath);
            
            if (index !== -1) {
                repoBookmarks.splice(index, 1);
            } else {
                repoBookmarks.push({ path: currentFilePath, name: currentFileName });
            }
            
            localStorage.setItem('study_bookmarks', JSON.stringify(bookmarksMap));
            updateBookmarkUI();
        });

        window.loadBookmark = (path) => {
            const fileObj = currentFlatTree.find(f => f.path === path);
            if (fileObj) {
                // Deselect active tree elements for visual correctness
                document.querySelectorAll('.tree-item').forEach(el => el.classList.remove('active'));
                loadFileContent(fileObj, null);
            }
        };

        // UI Helpers
        const toggleSidebar = () => {
            if (window.innerWidth < 768) {
                // Mobile Slide-in
                const isClosed = sidebar.classList.contains('-translate-x-full');
                if (isClosed) {
                    sidebar.classList.remove('-translate-x-full');
                    sidebarOverlay.classList.remove('hidden');
                } else {
                    sidebar.classList.add('-translate-x-full');
                    sidebarOverlay.classList.add('hidden');
                }
            } else {
                // Desktop Smooth Collapse
                sidebar.classList.toggle('desktop-collapsed');
            }
        };

        const showError = (msg) => {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-message').textContent = msg;
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.transform = 'translateY(160px)';
                toast.style.opacity = '0';
            }, 5000);
        };

        const formatBytes = (bytes, decimals = 2) => {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        };

        const getIconForFile = (filename) => {
            const ext = filename.split('.').pop().toLowerCase();
            return iconMap[ext] || 'file';
        };

        // GitHub API Fetcher
        async function fetchRepo() {
            const repoPath = repoInput.value.trim().replace(/^https?:\/\/github\.com\//, '');
            if (!repoPath || !repoPath.includes('/')) {
                showError("Please enter a valid format: username/repository");
                return;
            }

            if (window.innerWidth < 768 && sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            treeContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-slate-400 gap-4">
                    <div class="p-3 rounded-2xl bg-white/5 border border-white/10 shadow-lg">
                        <i data-lucide="loader-2" class="w-7 h-7 spinner text-blue-400"></i>
                    </div>
                    <p class="text-xs sm:text-sm font-medium">Fetching repository details...</p>
                </div>`;
            lucide.createIcons();
            
            try {
                // Fetch basic details
                const repoRes = await fetch(`https://api.github.com/repos/${repoPath}`);
                if (!repoRes.ok) throw new Error(repoRes.status === 404 ? "Repository not found" : "API Limit Exceeded");
                const repoData = await repoRes.json();
                
                defaultBranch = repoData.default_branch;
                currentRepo = repoPath;
                updateRecentRepos(currentRepo);
                renderBookmarks();
                
                repoStats.innerHTML = `<span class="flex items-center gap-1.5 px-2.5 py-1 rounded-lg bg-yellow-500/10 text-yellow-200 border border-yellow-500/20"><i data-lucide="star" class="w-3.5 h-3.5"></i> ${repoData.stargazers_count}</span>`;

                // Fetch Branches for selector
                const branchesRes = await fetch(`https://api.github.com/repos/${repoPath}/branches`);
                if (branchesRes.ok) {
                    const branchesData = await branchesRes.json();
                    branchSelect.innerHTML = branchesData.map(b => `<option value="${b.name}" ${b.name === defaultBranch ? 'selected' : ''}>${b.name}</option>`).join('');
                    branchSelect.classList.remove('hidden');
                }

                await fetchTreeOnly(currentRepo, defaultBranch);

            } catch (err) {
                treeContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-red-300 gap-3 text-center px-4">
                        <div class="p-3 rounded-2xl bg-red-500/10 border border-red-500/20 shadow-lg">
                            <i data-lucide="alert-triangle" class="w-8 h-8 text-red-400"></i>
                        </div>
                        <p class="text-xs sm:text-sm font-medium">${err.message}</p>
                    </div>`;
                lucide.createIcons();
                showError(err.message);
                branchSelect.classList.add('hidden');
            }
        }

        async function fetchTreeOnly(repoPath, branch) {
            treeContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-slate-400 gap-4">
                    <div class="p-3 rounded-2xl bg-white/5 border border-white/10 shadow-lg">
                        <i data-lucide="loader-2" class="w-7 h-7 spinner text-blue-400"></i>
                    </div>
                    <p class="text-xs sm:text-sm font-medium">Fetching file tree...</p>
                </div>`;
            lucide.createIcons();
            
            try {
                const treeRes = await fetch(`https://api.github.com/repos/${repoPath}/git/trees/${branch}?recursive=1`);
                if (!treeRes.ok) throw new Error("Could not fetch file tree");
                const treeData = await treeRes.json();
                currentFlatTree = treeData.tree;
                renderTreeUI(currentFlatTree);
            } catch(err) {
                treeContainer.innerHTML = `<p class="text-center p-4 text-red-400">${err.message}</p>`;
            }
        }

        // Branch Selection Event
        branchSelect.addEventListener('change', (e) => {
            defaultBranch = e.target.value;
            fetchTreeOnly(currentRepo, defaultBranch);
            
            // Clear current viewer if branch is changed
            document.getElementById('empty-state').classList.remove('hidden');
            document.getElementById('code-container').classList.add('hidden');
            document.getElementById('markdown-wrapper').classList.add('hidden');
            document.getElementById('image-wrapper').classList.add('hidden');
            document.getElementById('doc-wrapper').classList.add('hidden');
            document.getElementById('file-header').classList.add('hidden');
            closeAIPanel();
        });

        // Tree Builder & Renderer
        function renderTreeUI(flatTree) {
            const root = { name: 'root', type: 'tree', children: {} };
            
            flatTree.forEach(item => {
                const parts = item.path.split('/');
                let current = root;
                
                parts.forEach((part, i) => {
                    if (!current.children[part]) {
                        current.children[part] = {
                            name: part,
                            type: i === parts.length - 1 ? item.type : 'tree',
                            path: item.path,
                            size: item.size,
                            url: item.url,
                            children: {}
                        };
                    }
                    current = current.children[part];
                });
            });

            function createNodeElement(node, depth = 0) {
                const container = document.createElement('div');
                
                const children = Object.values(node.children).sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'tree' ? -1 : 1;
                });

                children.forEach(child => {
                    const itemDiv = document.createElement('div');
                    const paddingLeft = depth * 14 + 8;
                    
                    if (child.type === 'tree') {
                        itemDiv.className = 'tree-item flex items-center py-2 sm:py-1.5 px-2 rounded-xl text-slate-300 font-medium mb-0.5';
                        itemDiv.style.paddingLeft = `${paddingLeft}px`;
                        itemDiv.innerHTML = `
                            <i data-lucide="chevron-right" class="w-3.5 h-3.5 mr-2 shrink-0 transition-transform duration-300 opacity-60"></i>
                            <i data-lucide="folder" class="w-4 h-4 mr-2.5 shrink-0 text-blue-400 drop-shadow-sm"></i>
                            <span class="truncate tracking-wide file-name-label">${child.name}</span>
                        `;
                        
                        const childrenContainer = document.createElement('div');
                        childrenContainer.className = 'folder-content collapsed';
                        childrenContainer.appendChild(createNodeElement(child, depth + 1));
                        
                        itemDiv.onclick = (e) => {
                            const chevron = itemDiv.querySelector('[data-lucide^="chevron"]');
                            const isCollapsed = childrenContainer.classList.contains('collapsed');
                            
                            if (isCollapsed) {
                                childrenContainer.classList.remove('collapsed');
                                chevron.setAttribute('data-lucide', 'chevron-down');
                                chevron.classList.remove('opacity-60');
                                chevron.classList.add('opacity-100');
                            } else {
                                childrenContainer.classList.add('collapsed');
                                chevron.setAttribute('data-lucide', 'chevron-right');
                                chevron.classList.remove('opacity-100');
                                chevron.classList.add('opacity-60');
                            }
                            lucide.createIcons();
                        };

                        container.appendChild(itemDiv);
                        container.appendChild(childrenContainer);
                    } else {
                        const ext = child.name.split('.').pop().toLowerCase();
                        const iconName = getIconForFile(child.name);
                        const isImage = imageExts.includes(ext);
                        const isDoc = docExts.includes(ext);
                        
                        let iconColor = 'text-slate-400';
                        if (isImage) iconColor = 'text-purple-400';
                        if (isDoc) iconColor = 'text-emerald-400';
                        
                        itemDiv.className = 'tree-item flex items-center py-2 sm:py-1.5 px-2 rounded-xl text-slate-400 hover:text-slate-200 mb-0.5';
                        itemDiv.style.paddingLeft = `${paddingLeft + 22}px`;
                        itemDiv.innerHTML = `
                            <i data-lucide="${iconName}" class="w-4 h-4 mr-2.5 shrink-0 ${iconColor} drop-shadow-sm"></i>
                            <span class="truncate tracking-wide file-name-label">${child.name}</span>
                        `;
                        
                        itemDiv.onclick = () => loadFileContent(child, itemDiv);
                        container.appendChild(itemDiv);
                    }
                });
                return container;
            }

            treeContainer.innerHTML = '';
            fileSearchInput.value = ''; // Reset search
            treeContainer.appendChild(createNodeElement(root));
            lucide.createIcons();

            // Auto-load README.md if it exists
            const allItems = treeContainer.querySelectorAll('.tree-item');
            let foundReadme = false;
            allItems.forEach(item => {
                const label = item.querySelector('.file-name-label');
                if (label && label.textContent.toLowerCase() === 'readme.md' && !foundReadme) {
                    foundReadme = true;
                    setTimeout(() => item.click(), 100); 
                }
            });
        }

        // File Filter/Search Logic
        fileSearchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const allItems = treeContainer.querySelectorAll('.tree-item');
            
            if (!term) {
                allItems.forEach(item => item.style.display = 'flex');
                return;
            }

            // Hide everything initially
            allItems.forEach(item => {
                item.style.display = 'none';
            });

            // Re-show matches and expand their parent folders
            allItems.forEach(item => {
                const fileName = item.querySelector('.file-name-label').textContent.toLowerCase();
                if (fileName.includes(term)) {
                    item.style.display = 'flex';
                    
                    let parent = item.parentElement;
                    while (parent && parent.classList.contains('folder-content')) {
                        parent.classList.remove('collapsed');
                        if (parent.previousElementSibling) {
                            parent.previousElementSibling.style.display = 'flex';
                            const chev = parent.previousElementSibling.querySelector('[data-lucide^="chevron"]');
                            if (chev) {
                                chev.setAttribute('data-lucide', 'chevron-down');
                                chev.classList.remove('opacity-60');
                                chev.classList.add('opacity-100');
                            }
                        }
                        parent = parent.parentElement ? parent.parentElement.closest('.folder-content') : null;
                    }
                }
            });
            lucide.createIcons();
        });

        function applyFontSize() {
            codeDisplay.style.fontSize = `${currentFontSize}px`;
            lineNumbers.style.fontSize = `${currentFontSize}px`;
        }

        fontIncreaseBtn.addEventListener('click', () => {
            if (currentFontSize < 28) {
                currentFontSize += 2;
                applyFontSize();
            }
        });

        fontDecreaseBtn.addEventListener('click', () => {
            if (currentFontSize > 8) {
                currentFontSize -= 2;
                applyFontSize();
            }
        });

        // Fetch and Display File Content
        async function loadFileContent(file, element) {
            if (window.innerWidth < 768) {
                if(!sidebar.classList.contains('-translate-x-full')){
                   toggleSidebar();
                }
            }

            if (element) {
                if (activeFileElement) activeFileElement.classList.remove('active');
                activeFileElement = element;
                activeFileElement.classList.add('active');
            }

            emptyState.classList.add('hidden');
            codeContainer.classList.add('hidden');
            markdownWrapper.classList.add('hidden');
            imageWrapper.classList.add('hidden');
            docWrapper.classList.add('hidden');
            loadingState.classList.remove('hidden');
            fileHeader.classList.remove('hidden');
            
            // Build Breadcrumbs for Header
            const pathParts = file.path.split('/');
            fileHeaderName.innerHTML = pathParts.map((part, i) => {
                const isLast = i === pathParts.length - 1;
                return `<span class="${isLast ? 'text-white font-semibold drop-shadow-sm' : 'text-slate-400'}">${part}</span>`;
            }).join('<span class="mx-1.5 sm:mx-2 text-white/20">/</span>');
            
            fileSize.textContent = formatBytes(file.size);
            const iconName = getIconForFile(file.name);
            document.getElementById('file-header-icon').setAttribute('data-lucide', iconName);
            lucide.createIcons();

            const ext = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : file.name.toLowerCase();
            const rawUrl = `https://raw.githubusercontent.com/${currentRepo}/${defaultBranch}/${file.path}`;
            rawLink.href = rawUrl;
            
            // Set global info for downloads & AI context
            currentFileUrl = rawUrl;
            currentFileName = file.name;
            currentFilePath = file.path;
            
            updateBookmarkUI();

            try {
                if (imageExts.includes(ext)) {
                    loadingState.classList.add('hidden');
                    imageWrapper.classList.remove('hidden');
                    imageDisplay.src = rawUrl;
                    explainBtn.classList.add('hidden');
                    improveBtn.classList.add('hidden');
                    wrapBtn.classList.add('hidden');
                    fontIncreaseBtn.classList.add('sm:hidden');
                    fontDecreaseBtn.classList.add('sm:hidden');
                    closeAIPanel();
                } else if (docExts.includes(ext)) {
                    loadingState.classList.add('hidden');
                    docWrapper.classList.remove('hidden');
                    docDisplay.src = `https://docs.google.com/gview?url=${encodeURIComponent(rawUrl)}&embedded=true`;
                    explainBtn.classList.add('hidden');
                    improveBtn.classList.add('hidden');
                    wrapBtn.classList.add('hidden');
                    fontIncreaseBtn.classList.add('sm:hidden');
                    fontDecreaseBtn.classList.add('sm:hidden');
                    closeAIPanel();
                } else if (unsupportedExts.includes(ext)) {
                    loadingState.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    emptyState.innerHTML = `
                        <div class="p-6 rounded-3xl bg-white/5 border border-white/10 shadow-2xl backdrop-blur-xl mb-6">
                            <i data-lucide="file-x" class="w-12 h-12 sm:w-16 sm:h-16 text-slate-500"></i>
                        </div>
                        <p class="text-base sm:text-lg font-semibold text-white drop-shadow-md">Unsupported format</p>
                        <p class="text-xs sm:text-sm mt-2 text-slate-400 text-center max-w-[250px] sm:max-w-sm">Previewing this file format is not supported. Use the raw link to view or download.</p>
                    `;
                    lucide.createIcons();
                    explainBtn.classList.add('hidden');
                    improveBtn.classList.add('hidden');
                    wrapBtn.classList.add('hidden');
                    fontIncreaseBtn.classList.add('sm:hidden');
                    fontDecreaseBtn.classList.add('sm:hidden');
                    closeAIPanel();
                } else if (file.size > 1048576) {
                    loadingState.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    emptyState.innerHTML = `
                        <div class="p-6 rounded-3xl bg-yellow-500/10 border border-yellow-500/20 shadow-[0_0_30px_rgba(234,179,8,0.15)] backdrop-blur-xl mb-6">
                            <i data-lucide="hard-drive" class="w-12 h-12 sm:w-16 sm:h-16 text-yellow-400 drop-shadow-sm"></i>
                        </div>
                        <p class="text-base sm:text-lg font-semibold text-white drop-shadow-md">File too large</p>
                        <p class="text-xs sm:text-sm mt-2 text-slate-400 text-center max-w-[250px] sm:max-w-sm">This file is too large (${formatBytes(file.size)}) to preview safely in the browser.</p>
                    `;
                    lucide.createIcons();
                    explainBtn.classList.add('hidden');
                    improveBtn.classList.add('hidden');
                    wrapBtn.classList.add('hidden');
                    fontIncreaseBtn.classList.add('sm:hidden');
                    fontDecreaseBtn.classList.add('sm:hidden');
                    closeAIPanel();
                } else if (ext === 'md') {
                    // Special Handling for Markdown Files natively
                    const res = await fetch(rawUrl);
                    if (!res.ok) throw new Error("Failed to fetch markdown content");
                    
                    const text = await res.text();
                    // Setup code display context so the copy/AI buttons work
                    codeDisplay.textContent = text; 
                    
                    markdownWrapper.innerHTML = marked.parse(text);
                    markdownWrapper.querySelectorAll('pre code').forEach((block) => {
                        hljs.highlightElement(block);
                    });

                    loadingState.classList.add('hidden');
                    markdownWrapper.classList.remove('hidden');

                    explainBtn.classList.remove('hidden');
                    explainBtn.classList.add('flex');
                    improveBtn.classList.remove('hidden');
                    improveBtn.classList.add('flex');
                    wrapBtn.classList.add('hidden');
                    fontIncreaseBtn.classList.add('sm:hidden');
                    fontDecreaseBtn.classList.add('sm:hidden');
                    
                    if (!aiPanel.classList.contains('hidden')) {
                         aiContent.innerHTML = '<div class="p-4 rounded-xl bg-white/5 border border-white/10 text-center text-sm text-slate-400"><i data-lucide="mouse-pointer-click" class="w-5 h-5 mx-auto mb-2 opacity-50"></i>Select an action above to analyze this new file.</div>';
                         lucide.createIcons();
                    }
                } else {
                    const res = await fetch(rawUrl);
                    if (!res.ok) throw new Error("Failed to fetch file content");
                    
                    const text = await res.text();
                    
                    // Display Text/Code
                    codeDisplay.textContent = text;
                    codeDisplay.className = `language-${ext}`;
                    applyFontSize();
                    
                    // Render Line Numbers
                    const lineCount = text.split('\n').length;
                    lineNumbers.innerHTML = Array.from({length: lineCount || 1}, (_, i) => `<div>${i + 1}</div>`).join('');

                    delete codeDisplay.dataset.highlighted;
                    hljs.highlightElement(codeDisplay);

                    loadingState.classList.add('hidden');
                    codeContainer.classList.remove('hidden');

                    explainBtn.classList.remove('hidden');
                    explainBtn.classList.add('flex');
                    improveBtn.classList.remove('hidden');
                    improveBtn.classList.add('flex');
                    wrapBtn.classList.remove('hidden');
                    
                    // Restore original display class for font sizing on desktop
                    fontIncreaseBtn.classList.remove('sm:hidden');
                    fontDecreaseBtn.classList.remove('sm:hidden');
                    fontIncreaseBtn.classList.add('sm:flex');
                    fontDecreaseBtn.classList.add('sm:flex');
                    
                    if (!aiPanel.classList.contains('hidden')) {
                         aiContent.innerHTML = '<div class="p-4 rounded-xl bg-white/5 border border-white/10 text-center text-sm text-slate-400"><i data-lucide="mouse-pointer-click" class="w-5 h-5 mx-auto mb-2 opacity-50"></i>Select an action above to analyze this new file.</div>';
                         lucide.createIcons();
                    }
                }
            } catch (err) {
                loadingState.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.innerHTML = `
                    <div class="p-6 rounded-3xl bg-red-500/10 border border-red-500/20 shadow-[0_0_30px_rgba(239,68,68,0.15)] backdrop-blur-xl mb-6">
                        <i data-lucide="file-warning" class="w-12 h-12 sm:w-16 sm:h-16 text-red-400 drop-shadow-sm"></i>
                    </div>
                    <p class="text-base sm:text-lg font-semibold text-white drop-shadow-md">Cannot load file</p>
                    <p class="text-xs sm:text-sm mt-2 text-slate-400 text-center max-w-[250px] sm:max-w-sm">This file might be a binary format or threw a network error.</p>
                `;
                lucide.createIcons();
            }
        }

        // Feature Additions: Toggle Word Wrap
        wrapBtn.addEventListener('click', () => {
            codeDisplay.classList.toggle('whitespace-pre-wrap');
            codeDisplay.classList.toggle('break-words');
            
            if (codeDisplay.classList.contains('whitespace-pre-wrap')) {
                wrapBtn.classList.add('bg-white/10');
            } else {
                wrapBtn.classList.remove('bg-white/10');
            }
        });

        // Feature Additions: Fullscreen & Downloading
        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                viewerSection.requestFullscreen().catch(err => {
                    showError(`Cannot enable fullscreen: ${err.message}`);
                });
            } else {
                document.exitFullscreen();
            }
        });

        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                fullscreenBtn.innerHTML = '<i data-lucide="minimize" class="w-4 h-4"></i>';
            } else {
                fullscreenBtn.innerHTML = '<i data-lucide="maximize" class="w-4 h-4"></i>';
            }
            lucide.createIcons();
        });

        downloadBtn.addEventListener('click', async () => {
            if (!currentFileUrl) return;
            try {
                const res = await fetch(currentFileUrl);
                const blob = await res.blob();
                const blobUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.style.display = 'none';
                a.href = blobUrl;
                a.download = currentFileName;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(blobUrl);
                document.body.removeChild(a);
            } catch(e) {
                showError("Failed to download file.");
            }
        });

        // Event Listeners
        loadBtn.addEventListener('click', fetchRepo);
        repoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchRepo();
        });

        // Mobile Sidebar Listeners
        menuBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // --- Gemini AI Logic ---
        const apiKey = ""; // Paste your key exactly between these quotes.
        let userApiKey = localStorage.getItem('gemini_api_key') || "";
        
        function openAIPanel() {
            aiPanel.classList.remove('hidden');
            aiPanel.classList.add('flex');
            // Smoothly scroll to top of AI content when opened
            aiContent.parentElement.scrollTop = 0; 
        }

        function closeAIPanel() {
            aiPanel.classList.add('hidden');
            aiPanel.classList.remove('flex');
        }
        
        closeAiBtn.addEventListener('click', closeAIPanel);

        async function callGemini(promptText, systemInstruction) {
            const currentKey = apiKey || userApiKey;
            
            const models = [
                "gemini-2.5-flash-preview-09-2025", 
                "gemini-2.5-flash",
                "gemini-1.5-flash"
            ];
            let modelIndex = 0;
            
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            
            const delays = [1000, 2000, 4000, 8000, 16000];
            let attempt = 0;
            
            while (attempt < 5) {
                try {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/${models[modelIndex]}:generateContent?key=${currentKey}`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    
                    if (!response.ok) {
                        if (response.status === 404 && modelIndex < models.length - 1) {
                            modelIndex++;
                            throw new Error("MODEL_FALLBACK"); 
                        }
                        
                        if (response.status === 400 || response.status === 403) {
                            localStorage.removeItem('gemini_api_key');
                            userApiKey = "";
                            throw new Error("API Key Error: Invalid or Missing Key. Please check your key.");
                        }
                        throw new Error(`API Error (${response.status})`);
                    }
                    
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                } catch (error) {
                    if (error.message.includes("API Key Error")) throw error; 
                    if (error.message === "MODEL_FALLBACK") continue;

                    attempt++;
                    if (attempt >= 5) throw new Error("Failed to connect to Gemini API. Check your API key and network.");
                    
                    await new Promise(r => setTimeout(r, delays[attempt - 1]));
                }
            }
        }

        async function handleAIAction(action) {
            if (!codeDisplay.textContent) return;
            
            if (!apiKey && !userApiKey) {
                const key = prompt("To use AI features, please enter your Google Gemini API Key:\n(Get one from aistudio.google.com)");
                if (key) {
                    userApiKey = key.trim();
                    localStorage.setItem('gemini_api_key', userApiKey);
                } else {
                    return;
                }
            }
            
            openAIPanel();
            aiContent.classList.add('hidden');
            aiLoading.classList.remove('hidden');
            aiLoading.classList.add('flex');
            
            const code = codeDisplay.textContent;
            
            let promptText = "";
            let sys = "You are an expert developer assistant. Format your response in clean Markdown. Keep it concise but deeply informative. Be helpful and professional.";
            
            if (action === 'explain') {
                 promptText = `Explain the following code from the file '${currentFilePath}' in a concise and easy to understand way. Highlight the main purpose, key functions, and any interesting logic:\n\n\`\`\`\n${code}\n\`\`\``;
            } else if (action === 'improve') {
                 promptText = `Review the following code from '${currentFilePath}'. Identify any bugs, security issues, performance bottlenecks, and suggest specific improvements and best practices:\n\n\`\`\`\n${code}\n\`\`\``;
            }
            
            try {
                const result = await callGemini(promptText, sys);
                aiContent.innerHTML = marked.parse(result);
            } catch (e) {
                aiContent.innerHTML = `
                <div class="text-red-300 bg-red-950/50 p-4 rounded-xl border border-red-500/30 flex items-start gap-3 backdrop-blur-md shadow-lg">
                    <div class="p-1.5 rounded-full bg-red-500/20 shrink-0 mt-0.5">
                        <i data-lucide="alert-triangle" class="w-4 h-4 text-red-400"></i>
                    </div>
                    <span class="text-sm font-medium leading-relaxed">${e.message}</span>
                </div>`;
                lucide.createIcons();
            } finally {
                aiLoading.classList.add('hidden');
                aiLoading.classList.remove('flex');
                aiContent.classList.remove('hidden');
                
                document.querySelectorAll('#ai-content pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
        }

        // Action Buttons
        explainBtn.addEventListener('click', () => handleAIAction('explain'));
        improveBtn.addEventListener('click', () => handleAIAction('improve'));

        copyBtn.addEventListener('click', () => {
            if (codeDisplay.textContent) {
                navigator.clipboard.writeText(codeDisplay.textContent).then(() => {
                    const originalIcon = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-emerald-400"></i>';
                    lucide.createIcons();
                    setTimeout(() => {
                        copyBtn.innerHTML = originalIcon;
                    }, 2000);
                });
            }
        });

        lucide.createIcons();

    </script>
</body>
</html>
