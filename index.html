<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web-Programming-Practicals Visualizer</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Highlight.js for Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Marked.js for Markdown Rendering -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        code, pre { font-family: 'Fira Code', monospace; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        /* Tree Styles */
        .tree-item { cursor: pointer; user-select: none; transition: background 0.2s; }
        .tree-item:hover { background-color: #1e293b; }
        .tree-item.active { background-color: #3b82f6; color: white; }
        .folder-content { overflow: hidden; transition: max-height 0.3s ease-out; max-height: 2000px; }
        .folder-content.collapsed { max-height: 0; }
        
        /* Loading Spinner */
        .spinner { animation: spin 1s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        /* Code Container */
        .hljs { background: transparent !important; padding: 0 !important; }
        #code-display { tab-size: 4; }

        /* Markdown Body Styling for AI Output */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { color: #f8fafc; font-weight: 600; margin-top: 1.5em; margin-bottom: 0.5em; border-bottom: 1px solid #1e293b; padding-bottom: 0.25em; }
        .markdown-body p { margin-bottom: 1em; line-height: 1.6; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1em; padding-left: 1.5em; }
        .markdown-body ul { list-style-type: disc; }
        .markdown-body ol { list-style-type: decimal; }
        .markdown-body code { font-family: 'Fira Code', monospace; background-color: #1e293b; padding: 0.2em 0.4em; border-radius: 3px; font-size: 0.9em; }
        .markdown-body pre { background-color: #0f172a; padding: 1em; border-radius: 6px; overflow-x: auto; margin-bottom: 1em; border: 1px solid #1e293b; }
        .markdown-body pre code { background-color: transparent; padding: 0; }
        .markdown-body a { color: #3b82f6; text-decoration: underline; }
        .markdown-body strong { font-weight: 600; color: #f8fafc; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <!-- Navbar -->
    <header class="bg-slate-900 border-b border-slate-800 flex flex-col md:flex-row items-center justify-between px-4 sm:px-6 py-3 sm:py-4 shrink-0 shadow-lg z-30 gap-3 md:gap-0 relative">
        <div class="flex items-center w-full md:w-auto gap-3">
            <button id="mobile-menu-btn" class="md:hidden p-1 -ml-1 text-slate-400 hover:text-white rounded-md transition-colors" title="Toggle Explorer">
                <i data-lucide="menu" class="w-6 h-6"></i>
            </button>
            <i data-lucide="book-open" class="text-blue-400 w-5 h-5 sm:w-6 sm:h-6 shrink-0"></i>
            <h1 class="font-bold text-lg sm:text-xl tracking-tight text-slate-100 truncate">
                ThVariableYT's <span class="text-blue-500 hidden sm:inline">Repository Viewer</span><span class="text-blue-500 sm:hidden">Viewer</span>
            </h1>
        </div>
        <div class="flex items-center gap-2 w-full md:flex-1 max-w-xl md:ml-8">
            <div class="relative w-full">
                <i data-lucide="github" class="absolute left-3 top-1/2 transform -translate-y-1/2 w-4 h-4 sm:w-5 sm:h-5 text-slate-400"></i>
                <input type="text" id="repo-input" value="ThVariableYT/Web-Programming-Practicals" 
                    class="w-full bg-slate-800 border border-slate-700 text-slate-200 text-xs sm:text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 block pl-9 sm:pl-10 p-2 sm:p-2.5 transition-colors" 
                    placeholder="owner/repository">
            </div>
            <button id="load-btn" class="bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg text-xs sm:text-sm px-4 sm:px-5 py-2 sm:py-2.5 transition-colors focus:ring-4 focus:ring-blue-900 flex items-center gap-1 sm:gap-2 shrink-0">
                <i data-lucide="search" class="w-4 h-4"></i> <span class="hidden sm:inline">Load</span>
            </button>
        </div>
        <div class="hidden lg:flex items-center gap-4 text-sm text-slate-400 shrink-0">
            <span id="repo-stats"></span>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 flex overflow-hidden relative">
        
        <!-- Mobile Sidebar Overlay -->
        <div id="sidebar-overlay" class="absolute inset-0 bg-[#0f172a]/80 backdrop-blur-sm z-10 hidden transition-opacity duration-300"></div>

        <!-- Sidebar (File Tree) -->
        <aside id="sidebar" class="absolute md:relative z-20 w-72 h-full bg-slate-900 border-r border-slate-800 flex flex-col overflow-hidden shrink-0 transform -translate-x-full md:translate-x-0 transition-transform duration-300 ease-in-out shadow-2xl md:shadow-none">
            <div class="p-4 border-b border-slate-800 flex justify-between items-center bg-slate-900 shrink-0">
                <h2 class="font-semibold text-slate-300 flex items-center gap-2">
                    <i data-lucide="folder-tree" class="w-4 h-4"></i> Explorer
                </h2>
                <button id="close-sidebar-btn" class="md:hidden p-1 text-slate-400 hover:text-white rounded-md">
                    <i data-lucide="x" class="w-5 h-5"></i>
                </button>
            </div>
            <div id="tree-container" class="flex-1 overflow-y-auto p-2 text-sm text-slate-300">
                <div class="flex flex-col items-center justify-center h-full text-slate-500 gap-3">
                    <i data-lucide="arrow-up" class="w-8 h-8 animate-bounce"></i>
                    <p class="text-center text-xs sm:text-sm px-4">Enter a repository and click Load</p>
                </div>
            </div>
        </aside>

        <!-- Code Viewer -->
        <section class="flex-1 bg-[#0d1117] relative flex flex-col min-w-0">
            
            <!-- File Header -->
            <div id="file-header" class="h-12 border-b border-slate-800 flex items-center px-3 sm:px-4 bg-slate-900/80 backdrop-blur shrink-0 hidden">
                <div class="flex items-center gap-2 text-slate-300 text-xs sm:text-sm font-medium overflow-hidden">
                    <i id="file-header-icon" data-lucide="file" class="w-4 h-4 text-slate-400 shrink-0"></i>
                    <span id="file-header-name" class="truncate max-w-[150px] sm:max-w-md">filename.js</span>
                </div>
                <div class="ml-auto flex items-center gap-1 sm:gap-3 pl-2">
                    <span id="file-size" class="text-[10px] sm:text-xs text-slate-500 hidden sm:inline"></span>
                    
                    <!-- Gemini Actions -->
                    <button id="explain-btn" class="hidden items-center gap-1 px-2 py-1.5 text-xs font-medium text-purple-300 hover:text-white hover:bg-purple-900/50 rounded border border-purple-500/30 transition-colors shrink-0" title="Explain Code">
                        ✨<span class="hidden lg:inline"> Explain</span>
                    </button>
                    <button id="improve-btn" class="hidden items-center gap-1 px-2 py-1.5 text-xs font-medium text-emerald-300 hover:text-white hover:bg-emerald-900/50 rounded border border-emerald-500/30 transition-colors shrink-0" title="Suggest Improvements">
                        ✨<span class="hidden lg:inline"> Improve</span>
                    </button>

                    <button id="copy-btn" class="p-1.5 hover:bg-slate-700 rounded-md transition-colors text-slate-400 hover:text-white" title="Copy Code">
                        <i data-lucide="copy" class="w-4 h-4"></i>
                    </button>
                    <a id="raw-link" href="#" target="_blank" class="p-1.5 hover:bg-slate-700 rounded-md transition-colors text-slate-400 hover:text-white" title="View Raw">
                        <i data-lucide="external-link" class="w-4 h-4"></i>
                    </a>
                </div>
            </div>

            <!-- Content Area Wrapper for Split View -->
            <div class="flex-1 flex overflow-hidden relative">
                
                <div id="content-container" class="flex-1 overflow-auto relative min-w-0">
                    
                    <!-- Initial State -->
                    <div id="empty-state" class="absolute inset-0 flex flex-col items-center justify-center text-slate-500 p-6 text-center">
                        <i data-lucide="code-2" class="w-12 h-12 sm:w-16 sm:h-16 mb-4 text-slate-700"></i>
                        <p class="text-base sm:text-lg font-medium text-slate-400">No file selected</p>
                        <p class="text-xs sm:text-sm mt-1">Select a file from the explorer to view its contents</p>
                    </div>

                    <!-- Loading State -->
                    <div id="loading-state" class="absolute inset-0 flex flex-col items-center justify-center bg-[#0d1117]/80 z-10 hidden">
                        <i data-lucide="loader-2" class="w-8 h-8 text-blue-500 spinner mb-4"></i>
                        <p class="text-sm sm:text-base text-slate-300" id="loading-text">Loading...</p>
                    </div>

                    <!-- Code Block -->
                    <pre id="code-wrapper" class="hidden m-0 p-4 sm:p-6 min-h-full"><code id="code-display" class="text-xs sm:text-sm"></code></pre>
                    
                    <!-- Image Viewer -->
                    <div id="image-wrapper" class="hidden h-full flex items-center justify-center p-4 sm:p-8">
                        <img id="image-display" src="" alt="File preview" class="max-w-full max-h-full rounded shadow-lg object-contain">
                    </div>

                </div> <!-- End content-container -->

                <!-- AI Panel -->
                <div id="ai-panel" class="hidden flex-col w-full md:w-1/3 min-w-[320px] max-w-md border-t md:border-t-0 md:border-l border-slate-800 bg-slate-900 z-10 shrink-0 absolute right-0 inset-y-0 md:relative md:inset-auto transition-transform shadow-2xl md:shadow-none">
                    <div class="h-12 border-b border-slate-800 flex items-center justify-between px-4 shrink-0 bg-slate-900/95 backdrop-blur">
                        <span class="text-sm font-semibold text-slate-200 flex items-center gap-2">
                            ✨ AI Assistant
                        </span>
                        <button id="close-ai-btn" class="text-slate-400 hover:text-white p-1 rounded transition-colors" title="Close AI Panel">
                            <i data-lucide="x" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="flex-1 overflow-y-auto p-5 relative bg-[#0f172a]">
                        <div id="ai-loading" class="hidden flex-col items-center justify-center h-full">
                            <i data-lucide="sparkles" class="w-8 h-8 text-purple-500 animate-pulse mb-4"></i>
                            <p class="text-sm text-slate-300 font-medium">Gemini is analyzing...</p>
                        </div>
                        <div id="ai-content" class="markdown-body">
                            <!-- AI response injected here -->
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <!-- Error Toast -->
    <div id="error-toast" class="fixed bottom-6 right-6 bg-red-900/90 border border-red-700 text-white px-6 py-4 rounded-lg shadow-2xl transform transition-transform translate-y-32 opacity-0 flex items-center gap-3 z-50">
        <i data-lucide="alert-circle" class="w-5 h-5 text-red-400 shrink-0"></i>
        <span id="error-message" class="text-xs sm:text-sm font-medium"></span>
    </div>

    <script>
        // Initialize Icons
        lucide.createIcons();

        // DOM Elements
        const repoInput = document.getElementById('repo-input');
        const loadBtn = document.getElementById('load-btn');
        const treeContainer = document.getElementById('tree-container');
        const emptyState = document.getElementById('empty-state');
        const loadingState = document.getElementById('loading-state');
        const loadingText = document.getElementById('loading-text');
        const codeWrapper = document.getElementById('code-wrapper');
        const codeDisplay = document.getElementById('code-display');
        const imageWrapper = document.getElementById('image-wrapper');
        const imageDisplay = document.getElementById('image-display');
        const fileHeader = document.getElementById('file-header');
        const fileHeaderName = document.getElementById('file-header-name');
        const fileSize = document.getElementById('file-size');
        const copyBtn = document.getElementById('copy-btn');
        const rawLink = document.getElementById('raw-link');
        const repoStats = document.getElementById('repo-stats');
        
        // AI DOM Elements
        const explainBtn = document.getElementById('explain-btn');
        const improveBtn = document.getElementById('improve-btn');
        const aiPanel = document.getElementById('ai-panel');
        const closeAiBtn = document.getElementById('close-ai-btn');
        const aiContent = document.getElementById('ai-content');
        const aiLoading = document.getElementById('ai-loading');

        // Mobile DOM Elements
        const sidebar = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebar-overlay');
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const closeSidebarBtn = document.getElementById('close-sidebar-btn');

        // State
        let currentRepo = '';
        let defaultBranch = 'main';
        let activeFileElement = null;

        // File Icons Mapping
        const iconMap = {
            'html': 'file-code-2', 'js': 'file-json', 'jsx': 'file-json-2', 'ts': 'file-type-2', 'tsx': 'file-type-2',
            'css': 'file-code', 'json': 'file-json', 'md': 'file-text', 'py': 'file-code-2', 'java': 'file-code-2',
            'png': 'image', 'jpg': 'image', 'jpeg': 'image', 'gif': 'image', 'svg': 'image', 'ico': 'image',
            'pdf': 'file-text', 'zip': 'file-archive', 'gitignore': 'file-cog'
        };
        const imageExts = ['png', 'jpg', 'jpeg', 'gif', 'svg', 'ico', 'webp'];
        const unsupportedExts = [
            'pdf', 'zip', 'tar', 'gz', 'rar', '7z', 'exe', 'dll', 'so', 'dylib', 
            'mp3', 'mp4', 'avi', 'mkv', 'webm', 'mov', 'ttf', 'otf', 'woff', 'woff2', 
            'eot', 'db', 'sqlite', 'sqlite3', 'bin', 'iso', 'dmg', 'class', 'jar', 'pyc'
        ];

        // UI Helpers
        const toggleSidebar = () => {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                sidebarOverlay.classList.remove('hidden');
            } else {
                sidebar.classList.add('-translate-x-full');
                sidebarOverlay.classList.add('hidden');
            }
        };

        const showError = (msg) => {
            const toast = document.getElementById('error-toast');
            document.getElementById('error-message').textContent = msg;
            toast.style.transform = 'translateY(0)';
            toast.style.opacity = '1';
            setTimeout(() => {
                toast.style.transform = 'translateY(128px)';
                toast.style.opacity = '0';
            }, 5000);
        };

        const formatBytes = (bytes, decimals = 2) => {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const dm = decimals < 0 ? 0 : decimals;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(dm))} ${sizes[i]}`;
        };

        const getIconForFile = (filename) => {
            const ext = filename.split('.').pop().toLowerCase();
            return iconMap[ext] || 'file';
        };

        // GitHub API Fetcher
        async function fetchRepo() {
            const repoPath = repoInput.value.trim().replace(/^https?:\/\/github\.com\//, '');
            if (!repoPath || !repoPath.includes('/')) {
                showError("Please enter a valid format: username/repository");
                return;
            }

            // On mobile, automatically open sidebar when loading starts
            if (window.innerWidth < 768 && sidebar.classList.contains('-translate-x-full')) {
                toggleSidebar();
            }

            treeContainer.innerHTML = `
                <div class="flex flex-col items-center justify-center h-full text-slate-500 gap-3">
                    <i data-lucide="loader-2" class="w-8 h-8 spinner text-blue-500"></i>
                    <p class="text-xs sm:text-sm">Fetching repository tree...</p>
                </div>`;
            lucide.createIcons();
            
            try {
                // 1. Get Repo Details & Default Branch
                const repoRes = await fetch(`https://api.github.com/repos/${repoPath}`);
                if (!repoRes.ok) throw new Error(repoRes.status === 404 ? "Repository not found" : "API Limit Exceeded");
                const repoData = await repoRes.json();
                defaultBranch = repoData.default_branch;
                currentRepo = repoPath;
                repoStats.innerHTML = `<i data-lucide="star" class="w-4 h-4 inline mr-1"></i> ${repoData.stargazers_count} | <i data-lucide="git-branch" class="w-4 h-4 inline mr-1"></i> ${defaultBranch}`;
                lucide.createIcons();

                // 2. Fetch Git Tree
                const treeRes = await fetch(`https://api.github.com/repos/${repoPath}/git/trees/${defaultBranch}?recursive=1`);
                if (!treeRes.ok) throw new Error("Could not fetch file tree");
                const treeData = await treeRes.json();

                renderTreeUI(treeData.tree);

            } catch (err) {
                treeContainer.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-red-400 gap-3 text-center px-4">
                        <i data-lucide="alert-triangle" class="w-8 h-8 shrink-0"></i>
                        <p class="text-xs sm:text-sm">${err.message}</p>
                    </div>`;
                lucide.createIcons();
                showError(err.message);
            }
        }

        // Tree Builder & Renderer
        function renderTreeUI(flatTree) {
            // Build nested structure
            const root = { name: 'root', type: 'tree', children: {} };
            
            flatTree.forEach(item => {
                const parts = item.path.split('/');
                let current = root;
                
                parts.forEach((part, i) => {
                    if (!current.children[part]) {
                        current.children[part] = {
                            name: part,
                            type: i === parts.length - 1 ? item.type : 'tree',
                            path: item.path,
                            size: item.size,
                            url: item.url,
                            children: {}
                        };
                    }
                    current = current.children[part];
                });
            });

            // Recursive function to generate DOM elements
            function createNodeElement(node, depth = 0) {
                const container = document.createElement('div');
                
                // Sort children: directories first, then files
                const children = Object.values(node.children).sort((a, b) => {
                    if (a.type === b.type) return a.name.localeCompare(b.name);
                    return a.type === 'tree' ? -1 : 1;
                });

                children.forEach(child => {
                    const itemDiv = document.createElement('div');
                    const paddingLeft = depth * 16 + 8;
                    
                    if (child.type === 'tree') {
                        // Directory
                        itemDiv.className = 'tree-item flex items-center py-2 sm:py-1.5 px-2 rounded-md text-slate-300';
                        itemDiv.style.paddingLeft = `${paddingLeft}px`;
                        itemDiv.innerHTML = `
                            <i data-lucide="chevron-right" class="w-3.5 h-3.5 mr-1.5 shrink-0 transition-transform duration-200"></i>
                            <i data-lucide="folder" class="w-4 h-4 mr-2 shrink-0 text-blue-400"></i>
                            <span class="truncate">${child.name}</span>
                        `;
                        
                        const childrenContainer = document.createElement('div');
                        childrenContainer.className = 'folder-content collapsed';
                        childrenContainer.appendChild(createNodeElement(child, depth + 1));
                        
                        itemDiv.onclick = (e) => {
                            const chevron = itemDiv.querySelector('[data-lucide^="chevron"]');
                            const isCollapsed = childrenContainer.classList.contains('collapsed');
                            
                            if (isCollapsed) {
                                childrenContainer.classList.remove('collapsed');
                                chevron.setAttribute('data-lucide', 'chevron-down');
                            } else {
                                childrenContainer.classList.add('collapsed');
                                chevron.setAttribute('data-lucide', 'chevron-right');
                            }
                            lucide.createIcons();
                        };

                        container.appendChild(itemDiv);
                        container.appendChild(childrenContainer);
                    } else {
                        // File
                        const ext = child.name.split('.').pop().toLowerCase();
                        const iconName = getIconForFile(child.name);
                        const isImage = imageExts.includes(ext);
                        
                        itemDiv.className = 'tree-item flex items-center py-2 sm:py-1.5 px-2 rounded-md text-slate-400 hover:text-slate-200';
                        itemDiv.style.paddingLeft = `${paddingLeft + 18}px`; // Extra indent to align with folders
                        itemDiv.innerHTML = `
                            <i data-lucide="${iconName}" class="w-4 h-4 mr-2 shrink-0 ${isImage ? 'text-purple-400' : 'text-slate-500'}"></i>
                            <span class="truncate">${child.name}</span>
                        `;
                        
                        itemDiv.onclick = () => loadFileContent(child, itemDiv);
                        container.appendChild(itemDiv);
                    }
                });
                return container;
            }

            treeContainer.innerHTML = '';
            treeContainer.appendChild(createNodeElement(root));
            lucide.createIcons();
        }

        // Fetch and Display File Content
        async function loadFileContent(file, element) {
            // Mobile Optimization: close sidebar on selection
            if (window.innerWidth < 768) {
                toggleSidebar();
            }

            // UI Updates
            if (activeFileElement) activeFileElement.classList.remove('active');
            activeFileElement = element;
            activeFileElement.classList.add('active');

            emptyState.classList.add('hidden');
            codeWrapper.classList.add('hidden');
            imageWrapper.classList.add('hidden');
            loadingState.classList.remove('hidden');
            fileHeader.classList.remove('hidden');
            
            fileHeaderName.textContent = file.name;
            fileSize.textContent = formatBytes(file.size);
            const iconName = getIconForFile(file.name);
            document.getElementById('file-header-icon').setAttribute('data-lucide', iconName);
            lucide.createIcons();

            const ext = file.name.includes('.') ? file.name.split('.').pop().toLowerCase() : file.name.toLowerCase();
            const rawUrl = `https://raw.githubusercontent.com/${currentRepo}/${defaultBranch}/${file.path}`;
            rawLink.href = rawUrl;

            try {
                if (imageExts.includes(ext)) {
                    // Handle Images
                    loadingState.classList.add('hidden');
                    imageWrapper.classList.remove('hidden');
                    imageDisplay.src = rawUrl;
                    explainBtn.classList.add('hidden');
                    improveBtn.classList.add('hidden');
                    closeAIPanel();
                } else if (unsupportedExts.includes(ext)) {
                    // Handle Unsupported Formats explicitly
                    loadingState.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    emptyState.innerHTML = `
                        <i data-lucide="file-x" class="w-12 h-12 sm:w-16 sm:h-16 mb-4 text-slate-500"></i>
                        <p class="text-base sm:text-lg font-medium text-slate-400">Unsupported format</p>
                        <p class="text-xs sm:text-sm mt-1 text-slate-500 text-center max-w-[250px] sm:max-w-sm">Previewing this file format is not supported. Use the raw link to view or download.</p>
                    `;
                    lucide.createIcons();
                    explainBtn.classList.add('hidden');
                    improveBtn.classList.add('hidden');
                    closeAIPanel();
                } else if (file.size > 1048576) {
                    // Handle Large Files (Over 1MB)
                    loadingState.classList.add('hidden');
                    emptyState.classList.remove('hidden');
                    emptyState.innerHTML = `
                        <i data-lucide="hard-drive" class="w-12 h-12 sm:w-16 sm:h-16 mb-4 text-yellow-500"></i>
                        <p class="text-base sm:text-lg font-medium text-slate-400">File too large</p>
                        <p class="text-xs sm:text-sm mt-1 text-slate-500 text-center max-w-[250px] sm:max-w-sm">This file is too large (${formatBytes(file.size)}) to preview safely.</p>
                    `;
                    lucide.createIcons();
                    explainBtn.classList.add('hidden');
                    improveBtn.classList.add('hidden');
                    closeAIPanel();
                } else {
                    // Handle Text/Code
                    const res = await fetch(rawUrl);
                    if (!res.ok) throw new Error("Failed to fetch file content");
                    
                    const text = await res.text();
                    
                    codeDisplay.textContent = text;
                    codeDisplay.className = `language-${ext} text-xs sm:text-sm`;
                    
                    // Reset highlight.js formatting then re-apply
                    delete codeDisplay.dataset.highlighted;
                    hljs.highlightElement(codeDisplay);

                    loadingState.classList.add('hidden');
                    codeWrapper.classList.remove('hidden');

                    // Show AI buttons for code/text files
                    explainBtn.classList.remove('hidden');
                    explainBtn.classList.add('flex');
                    improveBtn.classList.remove('hidden');
                    improveBtn.classList.add('flex');
                    
                    // If AI panel is open, clear it for the new file
                    if (!aiPanel.classList.contains('hidden')) {
                         aiContent.innerHTML = '<p class="text-slate-400 italic">Select an action above to analyze the new file.</p>';
                    }
                }
            } catch (err) {
                loadingState.classList.add('hidden');
                emptyState.classList.remove('hidden');
                emptyState.innerHTML = `
                    <i data-lucide="file-warning" class="w-12 h-12 sm:w-16 sm:h-16 mb-4 text-red-500"></i>
                    <p class="text-base sm:text-lg font-medium text-slate-400">Cannot load file</p>
                    <p class="text-xs sm:text-sm mt-1 text-slate-500 text-center max-w-[250px] sm:max-w-sm">This file might be a binary format or too large to preview.</p>
                `;
                lucide.createIcons();
            }
        }

        // Event Listeners
        loadBtn.addEventListener('click', fetchRepo);
        repoInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fetchRepo();
        });

        // Mobile Sidebar Listeners
        mobileMenuBtn.addEventListener('click', toggleSidebar);
        closeSidebarBtn.addEventListener('click', toggleSidebar);
        sidebarOverlay.addEventListener('click', toggleSidebar);

        // --- Gemini AI Logic ---
        const apiKey = ""; 
        
        function openAIPanel() {
            aiPanel.classList.remove('hidden');
            aiPanel.classList.add('flex');
        }

        function closeAIPanel() {
            aiPanel.classList.add('hidden');
            aiPanel.classList.remove('flex');
        }
        
        closeAiBtn.addEventListener('click', closeAIPanel);

        async function callGemini(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] }
            };
            
            const delays = [1000, 2000, 4000, 8000, 16000];
            let attempt = 0;
            
            while (attempt < 5) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    if (!response.ok) throw new Error(`API Error (${response.status})`);
                    const data = await response.json();
                    return data.candidates?.[0]?.content?.parts?.[0]?.text || "No response generated.";
                } catch (error) {
                    attempt++;
                    if (attempt >= 5) throw new Error("Failed to connect to Gemini API after multiple retries.");
                    await new Promise(r => setTimeout(r, delays[attempt - 1]));
                }
            }
        }

        async function handleAIAction(action) {
            if (!codeDisplay.textContent) return;
            
            openAIPanel();
            aiContent.classList.add('hidden');
            aiLoading.classList.remove('hidden');
            aiLoading.classList.add('flex');
            
            const fileName = document.getElementById('file-header-name').textContent;
            const code = codeDisplay.textContent;
            
            let prompt = "";
            let sys = "You are an expert developer assistant. Format your response in clean Markdown. Keep it concise but deeply informative.";
            
            if (action === 'explain') {
                 prompt = `Explain the following code from the file '${fileName}' in a concise and easy to understand way. Highlight the main purpose, key functions, and any interesting logic:\n\n\`\`\`\n${code}\n\`\`\``;
            } else if (action === 'improve') {
                 prompt = `Review the following code from '${fileName}'. Identify any bugs, security issues, performance bottlenecks, and suggest specific improvements and best practices:\n\n\`\`\`\n${code}\n\`\`\``;
            }
            
            try {
                const result = await callGemini(prompt, sys);
                aiContent.innerHTML = marked.parse(result);
            } catch (e) {
                aiContent.innerHTML = `<div class="text-red-400 bg-red-900/20 p-4 rounded border border-red-800/50 flex items-start gap-2"><i data-lucide="alert-triangle" class="w-5 h-5 shrink-0 mt-0.5"></i> <span>${e.message}</span></div>`;
                lucide.createIcons();
            } finally {
                aiLoading.classList.add('hidden');
                aiLoading.classList.remove('flex');
                aiContent.classList.remove('hidden');
                
                // Highlight generated code blocks using existing highlighter
                document.querySelectorAll('#ai-content pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
            }
        }

        explainBtn.addEventListener('click', () => handleAIAction('explain'));
        improveBtn.addEventListener('click', () => handleAIAction('improve'));

        copyBtn.addEventListener('click', () => {
            if (codeDisplay.textContent) {
                navigator.clipboard.writeText(codeDisplay.textContent).then(() => {
                    const originalIcon = copyBtn.innerHTML;
                    copyBtn.innerHTML = '<i data-lucide="check" class="w-4 h-4 text-green-400"></i>';
                    lucide.createIcons();
                    setTimeout(() => {
                        copyBtn.innerHTML = originalIcon;
                    }, 2000);
                });
            }
        });

        // Initialize empty state icon
        lucide.createIcons();

    </script>
</body>
</html>
